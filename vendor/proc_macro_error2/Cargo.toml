[package]
name = "proc-macro-error2"
authors = [
  "CreepySkeleton <creepy-skeleton@yandex.ru>",
  "GnomedDev <david2005thomas@gmail.com>",
  "gamma0987 <gamma0987@posteo.de>",
]
version = "2.0.1"
description = "Almost drop-in replacement to panics in proc-macros (vendored from proc-macro-error3)"
repository = "https://github.com/gamma0987/proc-macro-error3"
rust-version = "1.61"
keywords = ["proc-macro", "error", "errors"]
categories = ["development-tools::procedural-macro-helpers"]
license = "MIT OR Apache-2.0"
edition = "2021"

[dependencies]
proc-macro-error-attr2 = { path = "../proc_macro_error_attr2", version = "=2.0.1" }
proc-macro2 = "1.0.74"
quote = "1.0.35"
syn = { version = "2.0.46", optional = true, default-features = false }

[features]
default = ["syn-error"]
nightly = []
syn-error = ["dep:syn"]

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = { level = "allow" }
