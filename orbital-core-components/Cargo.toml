[package]
name = "orbital-core-components"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lints]
workspace = true

[lib]
doctest = false

[dependencies]
leptos.workspace = true
turf.workspace = true
icondata.workspace = true
icondata_core.workspace = true
chrono.workspace = true
orbital-base-components = { path = "../orbital-base-components" }
orbital-theme = { path = "../orbital-theme", default-features = false }
orbital-macros = { path = "../orbital-macros" }
orbital-style = { path = "../orbital-style", default-features = false }
orbital-motion = { path = "../orbital-motion", default-features = false }
wasm-bindgen = { workspace = true }
web-sys = { version = "0.3", features = ["HtmlElement", "HtmlInputElement"] }
inventory = { version = "0.3", optional = true }
pulldown-cmark = { version = "0.13", optional = true }
palette = "0.7"

[features]
default = []
preview = ["dep:inventory", "dep:pulldown-cmark"]
hydrate = ["leptos/hydrate", "orbital-theme/hydrate", "orbital-base-components/hydrate", "orbital-style/hydrate", "orbital-motion/hydrate", "preview", "dep:inventory", "dep:pulldown-cmark"]
ssr = ["leptos/ssr", "orbital-theme/ssr", "orbital-base-components/ssr", "orbital-style/ssr", "orbital-motion/ssr", "preview", "dep:inventory", "dep:pulldown-cmark"]

[package.metadata.turf]
minify = true

[package.metadata.turf.class_names]
template = "<original_name>-<name_hash_short>"
excludes = ["^orbital-button.*", "^orbital-material.*", "^orbital-card.*", "^orbital-app-bar.*", "^orbital-layout.*", "^orbital-navigation.*", "^orbital-icon.*", "^orbital-scroll-area.*", "^orbital-tab.*", "^orbital-code.*", "^orbital-input.*", "^orbital-label.*", "^orbital-field.*", "^orbital-select.*", "^orbital-checkbox.*", "^orbital-switch.*", "^orbital-slider.*", "^orbital-numeric-stepper.*", "^orbital-textarea.*", "^orbital-tooltip.*", "^orbital-popover.*", "^orbital-menu.*", "^orbital-dialog.*", "^orbital-backdrop.*", "^orbital-overlay-layer.*", "^orbital-transfer-list.*", "^orbital-floating-actions-menu.*", "^orbital-message-bar.*", "^orbital-spinner.*", "^orbital-skeleton.*", "^orbital-badge.*", "^orbital-toast.*", "^orbital-loading-bar.*", "^orbital-grid.*", "^orbital-table.*", "^orbital-avatar.*", "^orbital-persona.*", "^orbital-link.*", "^orbital-image.*", "^orbital-breadcrumb.*", "^orbital-divider.*", "^orbital-space.*", "^orbital-date-picker.*", "^orbital-time-picker.*", "^orbital-color-picker.*", "^orbital-swatch-picker.*", "^orbital-combobox.*", "^orbital-auto-complete.*", "^orbital-tag.*", "^orbital-interaction-tag.*", "^orbital-rating.*", "^orbital-progress-bar.*", "^orbital-progress-circle.*", "^orbital-accordion.*", "^orbital-drawer.*", "^orbital-stack.*", "^orbital-upload.*", "^orbital-anchor.*", "^orbital-floating-button.*", "^orbital-back-to-top.*", "^orbital-content-with-aside.*", "^orbital-tree.*", "^orbital-motion-collapse.*", "^orbital-pagination.*", "^orbital-carousel.*"]
