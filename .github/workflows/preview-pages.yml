name: Preview Pages

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: preview-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install cargo-leptos
        run: cargo install cargo-leptos --locked --version 0.3.6

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108 --locked

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: preview-pages-${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: end2end/package-lock.json

      - name: Install Playwright
        working-directory: end2end
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build and run E2E
        env:
          LEPTOS_BASE_PATH: /orbital
          LEPTOS_ENV: PROD
          LEPTOS_OUTPUT_NAME: orbital-preview
          ORBITAL_PREVIEW_BASE_PATH: /orbital
          COMPONENT_PREVIEW_BASE_URL: http://127.0.0.1:3010/orbital
        run: cargo leptos end-to-end --release --project orbital-preview

      - name: Static export
        env:
          ORBITAL_EXPORT_STATIC: "1"
        run: ./target/release/orbital-preview-server

      - name: Write version file
        run: echo "${{ github.ref_name }}" > target/site-preview/version.txt

      - name: Sanity check export
        run: |
          test -f target/site-preview/index.html
          test -f target/site-preview/button/index.html
          test -f target/site-preview/pkg/orbital-preview.wasm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site-preview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
