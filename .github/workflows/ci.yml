name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: L1 macro tests
        run: cargo test -p component-preview-e2e

      - name: Workspace build (deny rustc warnings)
        run: cargo build --workspace

      - name: Lean component builds (no preview)
        run: |
          cargo build -p orbital-core-components --no-default-features
          cargo build -p orbital-datatable --no-default-features
          cargo build -p orbital-charts --no-default-features
          cargo build -p orbital-date-pickers --no-default-features
          cargo build -p orbital-scheduler --no-default-features
          cargo build -p orbital-tree --no-default-features

      - name: Workspace tests
        run: cargo test --workspace --lib --tests

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
